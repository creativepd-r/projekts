{% extends "base.html" %}

{% block title %}Edit Player {{ player.id }} | Tennis Stats{% endblock %}

{% block content %}
  <div class="row">
    <h1 style="margin: 0;">Edit Player</h1>
    <span class="spacer"></span>
    <a href="{{ url_for('players_view', player_id=player.id) }}">Back</a>
  </div>

  <div class="card" style="margin-top: 12px;">
    <form method="post" action="{{ url_for('players_update', player_id=player.id) }}">
      <label for="first_name">First name</label>
      <input id="first_name" name="first_name" value="{{ player.first_name }}" />

      <label for="last_name">Last name</label>
      <input id="last_name" name="last_name" value="{{ player.last_name }}" />

      <label for="country">Country</label>
      <input id="country" name="country" placeholder="USA, ESP, SRB..." value="{{ player.country or '' }}" />

      <label for="birth_year">Birth year</label>
      <input id="birth_year" name="birth_year" inputmode="numeric" value="{{ player.birth_year or '' }}" />

      <label for="hand">Hand</label>
      <select id="hand" name="hand">
        <option value="" {% if not player.hand %}selected{% endif %}>(unknown)</option>
        <option value="R" {% if player.hand == 'R' %}selected{% endif %}>Right</option>
        <option value="L" {% if player.hand == 'L' %}selected{% endif %}>Left</option>
      </select>

      <div class="row" style="margin-top: 12px;">
        <button class="btn-primary" type="submit">Save</button>
        <a href="{{ url_for('players_view', player_id=player.id) }}">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
