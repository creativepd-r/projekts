{% extends "base.html" %}

{% block title %}Add Tournament | Tennis Stats{% endblock %}

{% block content %}
  <div class="row">
    <h1 style="margin: 0;">Add Tournament</h1>
    <span class="spacer"></span>
    <a href="{{ url_for('tournaments_list') }}">Back</a>
  </div>

  <div class="card" style="margin-top: 12px;">
    <form method="post" action="{{ url_for('tournaments_create') }}">
      <label for="name">Name</label>
      <input id="name" name="name" required />

      <label for="level">Level</label>
      <input id="level" name="level" placeholder="Grand Slam, ATP 1000..." />

      <label for="location">Location</label>
      <input id="location" name="location" placeholder="Paris, London..." />

      <label for="surface">Surface</label>
      <select id="surface" name="surface">
        <option value="" selected>(unknown)</option>
        <option value="Hard">Hard</option>
        <option value="Clay">Clay</option>
        <option value="Grass">Grass</option>
        <option value="Carpet">Carpet</option>
      </select>

      <div class="row" style="margin-top: 12px;">
        <button class="btn-primary" type="submit">Create</button>
        <a href="{{ url_for('tournaments_list') }}">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
